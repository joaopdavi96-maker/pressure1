<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Diagnóstico Gatilho Vagal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF3F5;
    --surface:#FFFFFF;
    --ink:#0C2733;
    --ink-soft:#54707C;
    --ink-faint:#8AA1AB;
    --line:#DBE6EA;
    --teal:#0FA69F;
    --teal-deep:#0A7C77;
    --teal-wash:#E6F5F3;
    --alert:#E85D38;
    --alert-strong:#D22E24;
    --alert-wash:#FCEAE4;
    --amber:#F0A93B;
    --shadow:0 10px 40px -12px rgba(12,39,51,.28);
    --shadow-sm:0 4px 14px -6px rgba(12,39,51,.22);
    --radius:18px;
    --radius-sm:13px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    font-size:17px;line-height:1.5;
    -webkit-font-smoothing:antialiased;
    display:flex;justify-content:center;
    background-image:radial-gradient(circle at 50% -10%, #F6FAFB 0%, var(--bg) 55%);
  }
  .app{
    width:100%;max-width:540px;min-height:100dvh;
    background:var(--surface);
    display:flex;flex-direction:column;
    position:relative;overflow:hidden;
    box-shadow:var(--shadow);
  }
  @media(min-width:560px){ .app{margin:22px 0;min-height:calc(100dvh - 44px);border-radius:26px} }

  /* ---------- MONITOR HEADER ---------- */
  .monitor{
    padding:14px 20px 12px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#0C2733 0%,#123543 100%);
    color:#fff;position:relative;z-index:5;flex-shrink:0;
  }
  .monitor.hidden{display:none}
  .monitor-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
  .brand{display:flex;align-items:center;gap:8px;font-family:'Space Grotesk';font-weight:600;font-size:14.5px;letter-spacing:.2px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 0 rgba(15,166,159,.7);animation:beat 1.6s infinite}
  @keyframes beat{0%{box-shadow:0 0 0 0 rgba(15,166,159,.6)}70%{box-shadow:0 0 0 7px rgba(15,166,159,0)}100%{box-shadow:0 0 0 0 rgba(15,166,159,0)}}
  .step-tag{font-family:'IBM Plex Mono';font-size:11.5px;color:#8FB6BE;letter-spacing:.5px}

  .ecg{height:30px;width:100%;margin:2px 0 10px;overflow:hidden;position:relative;opacity:.9}
  .ecg svg{width:200%;height:100%;display:block;animation:scan 4s linear infinite}
  @keyframes scan{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .ecg path{fill:none;stroke:var(--teal);stroke-width:2;filter:drop-shadow(0 0 4px rgba(15,166,159,.6))}
  .monitor.alert .ecg path{stroke:var(--alert);filter:drop-shadow(0 0 5px rgba(232,93,56,.7))}
  .monitor.alert .ecg svg{animation-duration:1.6s}
  .monitor.alert .brand .dot{background:var(--alert)}

  .gauge-row{display:flex;align-items:center;gap:11px}
  .gauge-label{font-family:'IBM Plex Mono';font-size:10.5px;letter-spacing:1px;color:#9CC0C7;white-space:nowrap;text-transform:uppercase}
  .gauge{flex:1;height:8px;border-radius:6px;background:rgba(255,255,255,.13);overflow:hidden;position:relative}
  .gauge-fill{height:100%;width:8%;border-radius:6px;background:linear-gradient(90deg,var(--teal) 0%,var(--amber) 62%,var(--alert-strong) 100%);transition:width .7s cubic-bezier(.22,1,.36,1)}
  .gauge-val{font-family:'IBM Plex Mono';font-weight:600;font-size:12.5px;color:#fff;min-width:34px;text-align:right}

  /* ---------- SCREEN AREA ---------- */
  .screens{flex:1;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .screen{display:none;flex-direction:column;flex:1;padding:26px 22px 30px;animation:fade .45s ease}
  .screen.active{display:flex}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  .qmeta{display:flex;align-items:center;gap:9px;margin-bottom:14px}
  .qnum{font-family:'IBM Plex Mono';font-size:12px;font-weight:600;color:var(--teal-deep);background:var(--teal-wash);padding:4px 9px;border-radius:7px;letter-spacing:.5px}
  .qblock{font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-faint);letter-spacing:1px;text-transform:uppercase}
  .qtitle{font-family:'Space Grotesk';font-weight:600;font-size:25px;line-height:1.22;letter-spacing:-.4px;margin-bottom:8px}
  .qtitle .em{color:var(--alert-strong)}
  .qsub{color:var(--ink-soft);font-size:15.5px;margin-bottom:20px;line-height:1.45}

  .options{display:flex;flex-direction:column;gap:11px;margin-top:4px}
  .opt{
    display:flex;align-items:center;gap:13px;
    padding:16px 16px;border:2px solid var(--line);border-radius:var(--radius-sm);
    background:var(--surface);cursor:pointer;text-align:left;width:100%;
    font-family:inherit;font-size:17px;color:var(--ink);font-weight:500;line-height:1.32;
    transition:border-color .18s,background .18s,transform .12s;
  }
  .opt:hover{border-color:#B9D2D8}
  .opt:active{transform:scale(.99)}
  .opt .oe{font-size:22px;line-height:1;flex-shrink:0;width:26px;text-align:center}
  .opt .ck{margin-left:auto;width:22px;height:22px;border:2px solid var(--line);border-radius:7px;flex-shrink:0;position:relative;transition:.18s}
  .opt.multi .ck{border-radius:7px}
  .opt.selected{border-color:var(--teal);background:var(--teal-wash)}
  .opt.selected .ck{background:var(--teal);border-color:var(--teal)}
  .opt.selected .ck::after{content:"";position:absolute;left:6px;top:2px;width:6px;height:11px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg)}
  .opt.alertopt.selected{border-color:var(--alert);background:var(--alert-wash)}
  .opt.alertopt.selected .ck{background:var(--alert);border-color:var(--alert)}

  .hint{font-size:13px;color:var(--ink-faint);margin-top:14px;font-family:'IBM Plex Mono';letter-spacing:.3px}

  /* inputs */
  .field{margin-top:6px}
  .field label{display:block;font-weight:600;font-size:15px;margin-bottom:8px;color:var(--ink)}
  .field input[type=text],.field input[type=email],.field input[type=number]{
    width:100%;padding:15px 16px;border:2px solid var(--line);border-radius:var(--radius-sm);
    font-family:inherit;font-size:17px;color:var(--ink);background:var(--surface);transition:border-color .18s;
  }
  .field input:focus{outline:none;border-color:var(--teal)}
  .field + .field{margin-top:16px}

  .slider-wrap{margin-top:10px}
  .slider-val{font-family:'IBM Plex Mono';font-weight:600;font-size:34px;color:var(--teal-deep);text-align:center;margin-bottom:6px}
  .slider-val .u{font-size:16px;color:var(--ink-faint);margin-left:4px}
  input[type=range]{-webkit-appearance:none;width:100%;height:8px;border-radius:6px;background:var(--line);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:30px;height:30px;border-radius:50%;background:var(--teal);border:4px solid #fff;box-shadow:var(--shadow-sm);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:30px;height:30px;border-radius:50%;background:var(--teal);border:4px solid #fff;cursor:pointer}
  .range-ends{display:flex;justify-content:space-between;font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-faint);margin-top:6px}

  .sexrow{display:flex;gap:11px;margin-top:4px}
  .sexrow .opt{justify-content:center;flex-direction:column;gap:7px;padding:20px 10px;text-align:center}
  .sexrow .opt .oe{font-size:30px;width:auto}
  .sexrow .opt .ck{display:none}

  /* CTA */
  .cta{
    margin-top:auto;padding-top:22px;
  }
  .btn{
    width:100%;padding:18px;border:none;border-radius:14px;cursor:pointer;
    font-family:'Space Grotesk';font-weight:600;font-size:18px;letter-spacing:.2px;
    background:var(--teal);color:#fff;transition:transform .12s,box-shadow .2s,background .2s;
    box-shadow:0 10px 24px -10px rgba(15,166,159,.75);
    display:flex;align-items:center;justify-content:center;gap:9px;
  }
  .btn:hover{background:var(--teal-deep)}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{background:#C4D4D9;box-shadow:none;cursor:not-allowed;color:#fff}
  .btn.alert{background:var(--alert);box-shadow:0 10px 26px -10px rgba(232,93,56,.8)}
  .btn.alert:hover{background:var(--alert-strong)}
  .btn-arrow{font-size:20px}

  /* ---------- INTRO ---------- */
  .intro{justify-content:center;text-align:center;padding:38px 24px}
  .intro .badge{display:inline-flex;align-items:center;gap:7px;font-family:'IBM Plex Mono';font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--teal-deep);background:var(--teal-wash);padding:7px 13px;border-radius:20px;margin:0 auto 22px}
  .intro h1{font-family:'Space Grotesk';font-weight:700;font-size:33px;line-height:1.14;letter-spacing:-.8px;margin-bottom:16px}
  .intro h1 .em{color:var(--alert-strong)}
  .intro p{color:var(--ink-soft);font-size:16.5px;max-width:400px;margin:0 auto 8px}
  .intro .heartwrap{margin:6px auto 26px}
  .trust{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px;font-size:13px;color:var(--ink-faint);font-family:'IBM Plex Mono'}
  .trust .dot{width:6px;height:6px;border-radius:50%;background:var(--teal)}

  /* ---------- BREAK ---------- */
  .brk{justify-content:center;text-align:left;padding:34px 24px}
  .brk.center{text-align:center}
  .brk .kicker{font-family:'IBM Plex Mono';font-size:12px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;display:inline-flex;align-items:center;gap:8px}
  .brk.calm .kicker{color:var(--teal-deep)}
  .brk.warn .kicker{color:var(--alert-strong)}
  .brk h2{font-family:'Space Grotesk';font-weight:700;font-size:30px;line-height:1.16;letter-spacing:-.6px;margin-bottom:18px}
  .brk.warn h2{color:var(--ink)}
  .brk h2 .em{color:var(--alert-strong)}
  .brk p{color:var(--ink-soft);font-size:16.5px;line-height:1.55;margin-bottom:15px}
  .brk p .hl{color:var(--ink);font-weight:600}
  .brk p .hla{color:var(--alert-strong);font-weight:600}
  .statcard{background:var(--ink);color:#fff;border-radius:var(--radius);padding:20px;margin:6px 0 18px;position:relative;overflow:hidden}
  .statcard .big{font-family:'IBM Plex Mono';font-weight:600;font-size:40px;line-height:1;color:var(--amber)}
  .statcard .lbl{font-size:14px;color:#B7CDD4;margin-top:8px;line-height:1.4}
  .counter{display:inline-flex;align-items:center;gap:9px;font-family:'IBM Plex Mono';font-size:13px;color:var(--teal-deep);background:var(--teal-wash);padding:9px 14px;border-radius:22px;margin-bottom:6px}
  .counter .lv{width:8px;height:8px;border-radius:50%;background:var(--teal);animation:beat 1.6s infinite}

  /* vessel illustration */
  .vessel{margin:4px auto 22px;display:block}

  /* gauge illustration for break4 */
  .possbar{background:var(--teal-wash);border-radius:var(--radius);padding:20px;margin:8px 0 18px}
  .possbar .track{height:10px;background:#fff;border-radius:6px;overflow:hidden;margin-bottom:10px}
  .possbar .fill{height:100%;width:0;background:linear-gradient(90deg,var(--alert-strong),var(--amber) 55%,var(--teal));border-radius:6px;transition:width 1.4s cubic-bezier(.22,1,.36,1)}
  .possbar .cap{display:flex;justify-content:space-between;font-family:'IBM Plex Mono';font-size:11.5px;color:var(--ink-soft)}

  .testi{border:1px solid var(--line);border-radius:var(--radius-sm);padding:15px 16px;margin-bottom:11px;background:#FBFDFD}
  .testi .txt{font-size:15px;color:var(--ink);line-height:1.5;font-style:italic}
  .testi .who{font-family:'IBM Plex Mono';font-size:11.5px;color:var(--ink-faint);margin-top:9px;display:flex;align-items:center;gap:7px}
  .testi .who .av{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--teal-deep));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:10px}
  .placeholder-note{font-family:'IBM Plex Mono';font-size:10.5px;color:var(--ink-faint);text-align:center;margin-top:2px}

  /* ---------- VSL PLACEHOLDER ---------- */
  .vsl{justify-content:center;text-align:center;padding:30px 22px}
  .vsl .kicker{font-family:'IBM Plex Mono';font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--teal-deep);margin-bottom:14px}
  .vsl h2{font-family:'Space Grotesk';font-weight:600;font-size:23px;line-height:1.25;margin-bottom:18px;letter-spacing:-.3px}
  .videobox{position:relative;width:100%;aspect-ratio:16/9;background:linear-gradient(160deg,#0C2733,#164253);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#fff;border:1px solid rgba(255,255,255,.08);overflow:hidden;margin-bottom:8px}
  .videobox::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 40%,rgba(15,166,159,.22),transparent 60%)}
  .videobox .play{width:66px;height:66px;border-radius:50%;background:rgba(255,255,255,.14);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.35);z-index:2}
  .videobox .play::after{content:"";border-left:20px solid #fff;border-top:12px solid transparent;border-bottom:12px solid transparent;margin-left:5px}
  .videobox .vlbl{font-family:'IBM Plex Mono';font-size:12px;letter-spacing:1px;color:#9CC0C7;z-index:2}
  .videobox .vtag{position:absolute;top:12px;left:12px;font-family:'IBM Plex Mono';font-size:10px;letter-spacing:1px;background:rgba(232,93,56,.9);color:#fff;padding:4px 9px;border-radius:6px;z-index:2}

  /* ---------- CALC / LOADING ---------- */
  .calc{justify-content:center;text-align:center;padding:40px 26px}
  .calc h2{font-family:'Space Grotesk';font-weight:600;font-size:24px;margin-bottom:8px}
  .calc .sub{color:var(--ink-soft);font-size:15px;margin-bottom:30px}
  .ring{width:130px;height:130px;margin:0 auto 30px;position:relative}
  .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono';font-weight:600;font-size:30px;color:var(--teal-deep)}
  .calc-steps{text-align:left;max-width:340px;margin:0 auto;display:flex;flex-direction:column;gap:13px}
  .cstep{display:flex;align-items:center;gap:12px;font-size:15px;color:var(--ink-faint);opacity:.4;transition:.4s}
  .cstep.done{opacity:1;color:var(--ink)}
  .cstep .ci{width:24px;height:24px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.4s}
  .cstep.done .ci{background:var(--teal);border-color:var(--teal)}
  .cstep.done .ci::after{content:"";width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}

  /* ---------- RESULT ---------- */
  .result{padding:0}
  .result-hero{background:linear-gradient(165deg,#0C2733 0%,#15414F 100%);color:#fff;padding:34px 24px 30px;text-align:center;position:relative;overflow:hidden}
  .result-hero::before{content:"";position:absolute;top:-40%;left:-20%;width:140%;height:140%;background:radial-gradient(circle,rgba(232,93,56,.18),transparent 55%)}
  .result-hero .rk{font-family:'IBM Plex Mono';font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#9CC0C7;margin-bottom:18px;position:relative}
  .dial{width:180px;height:104px;margin:0 auto 14px;position:relative}
  .dial .needle{position:absolute;bottom:6px;left:50%;width:3px;height:74px;background:var(--alert);transform-origin:bottom center;transform:translateX(-50%) rotate(54deg);border-radius:3px;box-shadow:0 0 10px rgba(232,93,56,.8);transition:transform 1.4s cubic-bezier(.34,1.4,.5,1)}
  .dial .hub{position:absolute;bottom:0;left:50%;width:16px;height:16px;background:#fff;border-radius:50%;transform:translateX(-50%)}
  .level-badge{display:inline-flex;align-items:center;gap:8px;font-family:'Space Grotesk';font-weight:700;font-size:15px;letter-spacing:.5px;background:var(--alert);color:#fff;padding:8px 16px;border-radius:22px;position:relative;text-transform:uppercase}
  .result-hero .idx{font-family:'IBM Plex Mono';font-weight:600;font-size:15px;color:#fff;margin-top:14px;position:relative}
  .result-hero .idx b{color:var(--amber);font-size:19px}

  .result-body{padding:28px 24px 20px}
  .result-body .greet{font-family:'Space Grotesk';font-weight:600;font-size:22px;line-height:1.25;margin-bottom:16px;letter-spacing:-.3px}
  .result-body p{color:var(--ink-soft);font-size:16px;line-height:1.58;margin-bottom:15px}
  .result-body p .hl{color:var(--ink);font-weight:600}
  .result-body p .hla{color:var(--alert-strong);font-weight:600}
  .databox{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin:6px 0 20px}
  .databox .drow{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;font-size:14.5px;border-bottom:1px solid var(--line)}
  .databox .drow:last-child{border-bottom:none}
  .databox .drow .k{color:var(--ink-soft);display:flex;align-items:center;gap:8px}
  .databox .drow .v{font-family:'IBM Plex Mono';font-weight:600;color:var(--ink)}
  .databox .drow .v.hi{color:var(--alert-strong)}
  .verdict{background:var(--alert-wash);border-left:4px solid var(--alert);border-radius:10px;padding:16px 18px;margin:4px 0 22px}
  .verdict p{color:var(--ink);font-size:16px;line-height:1.55;margin:0;font-weight:500}

  .offer-lead{text-align:center;font-family:'Space Grotesk';font-weight:600;font-size:20px;margin:8px 0 16px;line-height:1.3}
  .final-cta{padding:6px 24px 34px}
  .cta-sub{text-align:center;font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-faint);margin-top:14px}
  .disclaimer-slot{margin:26px 24px 30px;padding:14px 16px;border:1px dashed var(--line);border-radius:12px;font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-faint);text-align:center;line-height:1.6}

  /* progress restart note for review */
  .devbar{position:fixed;bottom:0;left:0;right:0;display:flex;gap:6px;justify-content:center;padding:6px;background:rgba(12,39,51,.9);z-index:99;font-family:'IBM Plex Mono';font-size:11px}
  .devbar button{background:#1d4a5a;color:#9CC0C7;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px}
  .devbar button:hover{background:#26596b;color:#fff}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.01ms !important;transition-duration:.01ms !important}
  }
</style>
</head>
<body>
<div class="app">

  <!-- MONITOR HEADER -->
  <div class="monitor hidden" id="monitor">
    <div class="monitor-top">
      <div class="brand"><span class="dot"></span> Monitor Gatilho Vagal</div>
      <div class="step-tag" id="stepTag">ANÁLISE 00/30</div>
    </div>
    <div class="ecg">
      <svg viewBox="0 0 400 30" preserveAspectRatio="none">
        <path d="M0,15 L40,15 L48,15 L54,4 L60,26 L66,15 L110,15 L118,15 L124,8 L130,22 L136,15 L200,15 L240,15 L248,15 L254,4 L260,26 L266,15 L310,15 L318,15 L324,8 L330,22 L336,15 L400,15"/>
      </svg>
    </div>
    <div class="gauge-row">
      <span class="gauge-label">Nível de alerta</span>
      <div class="gauge"><div class="gauge-fill" id="gaugeFill"></div></div>
      <span class="gauge-val" id="gaugeVal">08%</span>
    </div>
  </div>

  <div class="screens" id="screens"></div>

</div>

<!-- DEV NAV (remova antes de publicar) -->
<div class="devbar">
  <button onclick="Quiz.jump(0)">↻ início</button>
  <button onclick="Quiz.jump('break2')">break 2</button>
  <button onclick="Quiz.jump('vsl1')">vsl1</button>
  <button onclick="Quiz.jump('break4')">break 4</button>
  <button onclick="Quiz.fillAndResult()">▶ resultado</button>
</div>

<script>
/* =========================================================
   GATILHO VAGAL — engine do quiz
   - Diagnóstico SEMPRE resolve para ALTO (nível 4 de 5)
   - Personalização cirúrgica via nome, idade, altura, peso
   ========================================================= */

const STATE = { answers:{}, score:8 };

/* ---- Definição das telas ---- */
const FLOW = [

  {type:'intro'},

  /* BLOCO 1 — SINTOMA */
  {type:'q', id:'q1', block:'Sintoma', num:1, kind:'single', emoji:'🩺',
   title:'Qual desses é o seu caso hoje?',
   opts:[
     {t:'Já tenho diagnóstico de pressão alta', e:'📋', s:4},
     {t:'Minha pressão vive "no limite" (12x8, 13x8...)', e:'⚠️', s:4},
     {t:'O médico falou em pré-hipertensão', e:'🔔', s:3},

/* =========================================================
   RENDER ENGINE
   ========================================================= */
const Quiz = (function(){
  let idx = 0;
  const scr = document.getElementById('screens');
  const monitor = document.getElementById('monitor');
  const gaugeFill = document.getElementById('gaugeFill');
  const gaugeVal = document.getElementById('gaugeVal');
  const stepTag = document.getElementById('stepTag');

  function esc(s){return (s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}

  function setGauge(pct){
    STATE.score = pct;
    gaugeFill.style.width = pct+'%';
    gaugeVal.textContent = String(Math.round(pct)).padStart(2,'0')+'%';
    monitor.classList.toggle('alert', pct>=55);
  }

  function bumpScore(delta){
    let p = Math.min(97, STATE.score + delta);
    setGauge(p);
  }

  function show(i){
    idx = i;
    const item = FLOW[i];
    scr.innerHTML = '';
    // monitor visível só durante perguntas/breaks (não intro, não result)
    const hideMonitor = ['intro','result'].includes(item.type);
    monitor.classList.toggle('hidden', hideMonitor);
    if(item.type==='q'){
      const totalQ = FLOW.filter(f=>f.type==='q').length;
      const qi = FLOW.slice(0,i+1).filter(f=>f.type==='q').length;
      stepTag.textContent = 'ANÁLISE '+String(item.num).padStart(2,'0')+'/30';
    }
    const el = document.createElement('div');
    el.className='screen active';
    scr.scrollTop=0;

    switch(item.type){
      case 'intro': el.className='screen active intro'; el.innerHTML=introHTML(); break;
      case 'q': el.innerHTML = questionHTML(item); break;
      case 'break': el.className='screen active brk '+(item.variant==='warn'?'warn':'calm'); el.innerHTML=breakHTML(item); break;
      case 'vsl': el.className='screen active vsl'; el.innerHTML=vslHTML(item); break;
      case 'capture': el.innerHTML=captureHTML(); break;
      case 'calc': el.className='screen active calc'; el.innerHTML=calcHTML(); break;
      case 'result': el.className='screen active result'; el.innerHTML=resultHTML(); break;
    }
    scr.appendChild(el);
    if(item.type==='q') wireQuestion(item, el);
    if(item.type==='break'){ if(item.progress) setGauge(item.progress); animateBreak(item,el); }
    if(item.type==='calc') runCalc(el);
    if(item.type==='result') animateResult(el);
  }

  function next(){ if(idx<FLOW.length-1) show(idx+1); }

  /* ---------- INTRO ---------- */
  function introHTML(){
    return `
     <div class="badge">🫀 Diagnóstico em 2 minutos</div>
     <div class="heartwrap">${heartSVG()}</div>
     <h1>Você corta o sal, toma o remédio certinho — e a pressão <span class="em">continua subindo?</span></h1>
     <p>Existe um motivo. E ele nunca esteve no seu prato.</p>
     <p>Responda 30 perguntas rápidas e descubra o seu <b>Índice de Alarme Vascular</b> — o cálculo que explica por que nada que você tentou até hoje funcionou.</p>
     <div class="cta"><button class="btn" onclick="Quiz.next()">Iniciar meu diagnóstico <span class="btn-arrow">→</span></button></div>
     <div class="trust"><span class="dot"></span> Gratuito &nbsp;·&nbsp; Resultado personalizado &nbsp;·&nbsp; 2 min</div>
    `;
  }

  /* ---------- QUESTION ---------- */
  function questionHTML(item){
    let inner='';
    if(item.kind==='single' || item.kind==='multi'){
      inner = `<div class="options">`+ item.opts.map((o,k)=>`
        <button class="opt ${item.kind==='multi'?'multi':''} ${o.alert?'alertopt':''}" data-k="${k}" data-s="${o.s||0}">
          ${o.e?`<span class="oe">${o.e}</span>`:''}
          <span class="otxt">${o.t}</span>
          <span class="ck"></span>
        </button>`).join('') + `</div>`;
      if(item.kind==='multi') inner += `<div class="hint">▹ selecione todas que se aplicam, depois toque em continuar</div>`;
    }
    if(item.kind==='sex'){
      inner = `<div class="sexrow">`+ item.opts.map((o,k)=>`
        <button class="opt" data-k="${k}" data-v="${o.t}">
          <span class="oe">${o.e}</span><span class="otxt">${o.t}</span><span class="ck"></span>
        </button>`).join('') + `</div>`;
    }
    if(item.kind==='slider'){
      inner = `
        <div class="slider-wrap">
          <div class="slider-val"><span id="sv_${item.id}">${item.def}</span><span class="u">${item.unit}</span></div>
          <input type="range" id="rg_${item.id}" min="${item.min}" max="${item.max}" value="${item.def}">
          <div class="range-ends"><span>${item.min}</span><span>${item.max}</span></div>
        </div>`;
    }
    const showBtn = (item.kind==='multi' || item.kind==='slider');
    return `
      <div class="qmeta">
        <span class="qnum">${String(item.num).padStart(2,'0')}</span>
        <span class="qblock">${item.block}</span>
      </div>
      <div class="qtitle">${item.emoji?item.emoji+' ':''}${item.title}</div>
      ${item.sub?`<div class="qsub">${item.sub}</div>`:''}
      ${inner}
      ${showBtn?`<div class="cta"><button class="btn" id="qcont" ${item.kind==='multi'?'disabled':''} onclick="Quiz.commit()">Continuar <span class="btn-arrow">→</span></button></div>`:''}
    `;
  }

  function wireQuestion(item, el){
    if(item.kind==='single'){
      el.querySelectorAll('.opt').forEach(b=>{
        b.onclick=()=>{
          el.querySelectorAll('.opt').forEach(x=>x.classList.remove('selected'));
          b.classList.add('selected');
          STATE.answers[item.id] = { k:+b.dataset.k, t:item.opts[+b.dataset.k].t, meta:item.opts[+b.dataset.k].meta };
          bumpScore(+b.dataset.s * .9);
          setTimeout(next,260);
        };
      });
    }
    if(item.kind==='sex'){
      el.querySelectorAll('.opt').forEach(b=>{
        b.onclick=()=>{
          el.querySelectorAll('.opt').forEach(x=>x.classList.remove('selected'));
          b.classList.add('selected');
          STATE.answers[item.id]=b.dataset.v;
          setTimeout(next,260);
        };
      });
    }
    if(item.kind==='multi'){
      const btn = el.querySelector('#qcont');
      el.querySelectorAll('.opt').forEach(b=>{
        b.onclick=()=>{
          b.classList.toggle('selected');
          const any = el.querySelectorAll('.opt.selected').length>0;
          btn.disabled = !any;
        };
      });
    }
    if(item.kind==='slider'){
      const rg = el.querySelector('#rg_'+item.id);
      const sv = el.querySelector('#sv_'+item.id);
      rg.oninput=()=>{ sv.textContent=rg.value; STATE.answers[item.id]=+rg.value; };
      STATE.answers[item.id]=+rg.value;
    }
  }

  function commit(){
    const item = FLOW[idx];
    if(item.kind==='multi'){
      const el = scr.querySelector('.screen');
      const sel=[...el.querySelectorAll('.opt.selected')];
      STATE.answers[item.id]=sel.map(s=>item.opts[+s.dataset.k].t);
      let add=sel.reduce((a,s)=>a+(+s.dataset.s||0),0);
      bumpScore(add*.7);
    }
    if(item.kind==='slider'){
      // idade e tempo pressão sobem levemente o gauge pra dar sensação de cálculo
      if(item.id==='idade' && STATE.answers.idade>=55) bumpScore(3);
    }
    next();
  }

  /* ---------- BREAK ---------- */
  function breakHTML(item){
    let h='';
    if(item.bridge){
      const a=STATE.answers;
      const idade=a.idade||'—';
      const tempo=(a.tempo_med&&a.tempo_med.meta)?a.tempo_med.meta:'algum tempo';
      h=`Com <span class="hl">${idade} anos</span> e <span class="hl">${tempo}</span> de tratamento sem controle total, já temos tudo que precisamos.`;
    } else { h=item.h; }
    return `
      <div class="kicker">${item.kicker}</div>
      ${h?`<h2>${h}</h2>`:''}
      ${item.vessel?`<div class="vessel">${vesselSVG()}</div>`:''}
      ${item.body||''}
      ${item.stat?`<div class="statcard"><div class="big">${item.stat.big}</div><div class="lbl">${item.stat.lbl}</div></div>`:''}
      ${item.after||''}
      ${item.poss?possBlock(item):''}
      ${item.counter?`<div class="counter"><span class="lv"></span> ${item.counter}</div>`:''}
      <div class="cta"><button class="btn ${item.variant==='warn'?'alert':''}" onclick="Quiz.next()">${item.variant==='warn'?'Quero ver a causa real':'Continuar'} <span class="btn-arrow">→</span></button></div>
    `;
  }
  function possBlock(item){
    let t = item.testimonials.map(x=>`
      <div class="testi"><div class="txt">${x.txt}</div><div class="who"><span class="av">${x.av}</span>${x.who} · relato de participante</div></div>`).join('');
    return `<div class="possbar"><div class="track"><div class="fill" id="possfill"></div></div><div class="cap"><span>Sem desligar o alarme</span><span>Com o Gatilho Vagal</span></div></div>${t}`;
  }
  function animateBreak(item,el){
    const pf=el.querySelector('#possfill');
    if(pf) setTimeout(()=>pf.style.width='88%',250);
  }

  /* ---------- VSL ---------- */
  function vslHTML(item){
    return `
      <div class="kicker">${item.kicker}</div>
      <h2>${item.h}</h2>
      <div class="videobox">
        <span class="vtag">${item.tag}</span>
        <div class="play"></div>
        <span class="vlbl">${item.vlbl}</span>
      </div>
      <div class="placeholder-note">▹ espaço reservado — o vídeo do expert entra aqui</div>
      <div class="cta"><button class="btn" onclick="Quiz.next()">${item.btn} <span class="btn-arrow">→</span></button></div>
    `;
  }

  /* ---------- CAPTURE ---------- */
  function captureHTML(){
    return `
      <div class="qmeta"><span class="qnum">✓</span><span class="qblock">Diagnóstico pronto</span></div>
      <div class="qtitle">Pra onde enviamos o seu resultado?</div>
      <div class="qsub">Seu Índice de Alarme Vascular e o acesso ao protocolo ficam vinculados a este e-mail.</div>
      <div class="field"><label>Seu nome</label><input type="text" id="cap_nome" placeholder="Como podemos te chamar?" autocomplete="given-name"></div>
      <div class="field"><label>Seu melhor e-mail</label><input type="email" id="cap_email" placeholder="seu@email.com" autocomplete="email"></div>
      <div class="cta"><button class="btn" id="capbtn" disabled onclick="Quiz.submitCapture()">Ver meu diagnóstico <span class="btn-arrow">→</span></button></div>
      <div class="hint" style="text-align:center">🔒 Seus dados ficam protegidos e não são compartilhados.</div>
    `;
  }
  function wireCapture(el){
    const n=el.querySelector('#cap_nome'), e=el.querySelector('#cap_email'), b=el.querySelector('#capbtn');
    function chk(){ b.disabled = !(n.value.trim().length>1 && /.+@.+\..+/.test(e.value)); }
    n.oninput=chk; e.oninput=chk;
  }
  function submitCapture(){
    const el=scr.querySelector('.screen');
    STATE.answers.nome = el.querySelector('#cap_nome').value.trim();
    STATE.answers.email = el.querySelector('#cap_email').value.trim();
    setGauge(97);
    next();
  }

  /* ---------- CALC ---------- */
  function calcHTML(){
    return `
      <div class="ring">
        <svg width="130" height="130"><circle cx="65" cy="65" r="56" stroke="#E1ECEF" stroke-width="10" fill="none"/>
        <circle id="ringP" cx="65" cy="65" r="56" stroke="var(--teal)" stroke-width="10" fill="none" stroke-linecap="round" stroke-dasharray="352" stroke-dashoffset="352"/></svg>
        <div class="pct" id="ringPct">0%</div>
      </div>
      <h2>Cruzando as suas respostas...</h2>
      <div class="sub">Montando seu diagnóstico personalizado</div>
      <div class="calc-steps">
        <div class="cstep" data-s="1"><span class="ci"></span> Cruzando respostas com o perfil de alerta autonômico</div>
        <div class="cstep" data-s="2"><span class="ci"></span> Analisando seu padrão respiratório</div>
        <div class="cstep" data-s="3"><span class="ci"></span> Medindo tempo de exposição ao estado de alerta</div>
        <div class="cstep" data-s="4"><span class="ci"></span> Calculando seu Índice de Alarme Vascular</div>
      </div>
    `;
  }
  function runCalc(el){
    const steps=[...el.querySelectorAll('.cstep')];
    const ring=el.querySelector('#ringP'), pct=el.querySelector('#ringPct');
    let p=0; const dur=3400, t0=performance.now();
    function tick(now){
      let k=Math.min(1,(now-t0)/dur); p=Math.round(k*100);
      ring.style.strokeDashoffset = 352-(352*k);
      pct.textContent=p+'%';
      steps.forEach((s,i)=>{ if(k > (i+1)/4.3) s.classList.add('done'); });
      if(k<1) requestAnimationFrame(tick); else setTimeout(next,500);
    }
    requestAnimationFrame(tick);
  }

  /* ---------- RESULT (sempre ALTO nível 4/5) ---------- */
  function computeIndex(){
    // sempre banda alta: 78–89, ponderado pelas respostas pra parecer "merecido"
    let base = 78 + Math.round(Math.min(11, (STATE.score-60)*0.35));
    if(base<78) base=78; if(base>89) base=89;
    return base;
  }
  function resultHTML(){
    const a=STATE.answers;
    const nome = a.nome ? a.nome.split(' ')[0] : '';
    const idade = a.idade || 54;
    const altura = a.altura || 165;
    const peso = a.peso || 78;
    const imc = (peso/Math.pow(altura/100,2));
    const imcTxt = imc.toFixed(1).replace('.',',');
    let imcBand = imc>=30?'bem acima da faixa saudável': imc>=25?'acima da faixa saudável':'dentro da faixa';
    const idx = computeIndex();
    const tempo = (a.tempo_med&&a.tempo_med.meta)?a.tempo_med.meta:'algum tempo';
    const medo = Array.isArray(a.q18)&&a.q18.length ? a.q18[0].toLowerCase() : 'o que pode acontecer';
    const anosExpo = Math.max(1, Math.round((idade-35)));

    // linha cirúrgica de IMC (sem meta numérica de peso, sem prescrição)
    const imcLine = imc>=25
      ? `Com <span class="hl">${peso}kg</span> e <span class="hl">${altura}cm</span>, seu índice corporal está <span class="hla">${imcBand}</span> — e cada ponto acima adiciona carga ao mesmo sistema de alerta que já está sobrecarregado.`
      : `Mesmo com um índice corporal dentro da faixa, seu sistema de alerta está sobrecarregado — o que confirma que a causa, no seu caso, é ainda mais ligada ao gatilho autonômico do que ao peso.`;

    return `
      <div class="result-hero">
        <div class="rk">Índice de Alarme Vascular</div>
        <div class="dial">${dialSVG()}<div class="needle" id="needle"></div><div class="hub"></div></div>
        <div class="level-badge">⚠ ALTO · Nível 4 de 5</div>
        <div class="idx">Seu índice: <b id="idxNum">${idx}</b> / 100</div>
      </div>

      <div class="result-body">
        <div class="greet">${nome?nome+', ':''}seu resultado explica exatamente o que você vem vivendo.</div>

        <div class="databox">
          <div class="drow"><span class="k">🎂 Idade</span><span class="v">${idade} anos</span></div>
          <div class="drow"><span class="k">⚖️ Índice corporal (IMC)</span><span class="v ${imc>=25?'hi':''}">${imcTxt}</span></div>
          <div class="drow"><span class="k">💊 Tempo de tratamento</span><span class="v">${tempo}</span></div>
          <div class="drow"><span class="k">⏱️ Tempo em estado de alerta</span><span class="v hi">≈ ${anosExpo} anos</span></div>
          <div class="drow"><span class="k">🚨 Nível de alarme</span><span class="v hi">ALTO (4/5)</span></div>
        </div>

        <p>Pelas suas respostas, seu corpo está preso no modo de alerta há <span class="hla">cerca de ${anosExpo} anos</span>. Respiração curta, sono picado, ombros tensos, pressão que sobe do nada — não são coisas separadas. <span class="hl">São o mesmo alarme, ligado 24 horas por dia.</span></p>

        <p>${imcLine}</p>

        <p>É por isso que cortar o sal não resolveu. É por isso que o remédio segura o número, mas você continua com medo de ${medo}.</p>

        <div class="verdict"><p>Você nunca teve um problema de disciplina. Você tinha um <span class="hla">alarme travado</span> — e ninguém tinha te dito. Agora você sabe o nome dele.</p></div>

        <div class="offer-lead">Assista abaixo como acionar o seu Gatilho Vagal 👇</div>
      </div>

      <!-- VSL 2 — PITCH (expert) -->
      <div style="padding:0 24px">
        <div class="videobox">
          <span class="vtag">VSL 2 · OFERTA</span>
          <div class="play"></div>
          <span class="vlbl">[ VÍDEO DO EXPERT · 1–3 min ]</span>
        </div>
        <div class="placeholder-note">▹ espaço reservado — vídeo de pitch do expert entra aqui</div>
      </div>

      <div class="final-cta">
        <button class="btn alert" onclick="alert('→ redireciona para o checkout')">Quero acionar meu Gatilho Vagal <span class="btn-arrow">→</span></button>
        <div class="cta-sub">Acesso imediato pela área de membros após a compra</div>
      </div>

      <div class="disclaimer-slot">[ ESPAÇO PARA DISCLAIMERS — inserção manual ]<br>caráter educativo · não substitui acompanhamento médico</div>
    `;
  }
  function animateResult(el){
    const needle=el.querySelector('#needle');
    if(needle){ needle.style.transform='translateX(-50%) rotate(54deg)';
      setTimeout(()=>needle.style.transform='translateX(-50%) rotate(54deg)',50); }
  }

  /* ---------- SVGs ---------- */
  function heartSVG(){return `<svg width="92" height="92" viewBox="0 0 92 92" fill="none">
     <circle cx="46" cy="46" r="44" stroke="#D7E7EA" stroke-width="2"/>
     <path d="M20 47 H34 L39 34 L47 60 L53 44 L57 47 H72" stroke="var(--teal)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
   </svg>`;}
  function vesselSVG(){return `<svg width="230" height="86" viewBox="0 0 230 86" fill="none">
     <text x="8" y="16" font-family="IBM Plex Mono" font-size="9" fill="#8AA1AB">VASO EM ALERTA</text>
     <rect x="8" y="24" width="100" height="34" rx="17" fill="#FCEAE4" stroke="#E85D38" stroke-width="2"/>
     <rect x="20" y="35" width="76" height="12" rx="6" fill="#E85D38" opacity=".45"/>
     <text x="122" y="16" font-family="IBM Plex Mono" font-size="9" fill="#8AA1AB">VASO RELAXADO</text>
     <rect x="122" y="20" width="100" height="42" rx="21" fill="#E6F5F3" stroke="#0FA69F" stroke-width="2"/>
     <rect x="134" y="35" width="76" height="12" rx="6" fill="#0FA69F" opacity=".4"/>
     <path d="M108 41 L122 41" stroke="#8AA1AB" stroke-width="2" stroke-dasharray="3 3"/>
   </svg>`;}
  function dialSVG(){return `<svg width="180" height="104" viewBox="0 0 180 104">
     <path d="M14 96 A76 76 0 0 1 166 96" fill="none" stroke="#1d4a5a" stroke-width="12" stroke-linecap="round"/>
     <path d="M14 96 A76 76 0 0 1 60 30" fill="none" stroke="#0FA69F" stroke-width="12" stroke-linecap="round"/>
     <path d="M60 30 A76 76 0 0 1 120 30" fill="none" stroke="#F0A93B" stroke-width="12"/>
     <path d="M120 30 A76 76 0 0 1 166 96" fill="none" stroke="#D22E24" stroke-width="12" stroke-linecap="round"/>
   </svg>`;}

  /* ---------- controle externo ---------- */
  function jump(target){
    if(target===0){ STATE.answers={}; setGauge(8); show(0); return; }
    const i = FLOW.findIndex(f=>f.id===target);
    if(i>=0) show(i);
  }
  function fillAndResult(){
    STATE.answers={nome:'Ana', email:'ana@email.com', idade:58, sexo:'Mulher', altura:162, peso:84,
      tempo_med:{meta:'mais de 5 anos'}, q18:['AVC / derrame']};
    setGauge(88);
    const i=FLOW.findIndex(f=>f.type==='result'); show(i);
  }

  // observer p/ wire da captura (é renderizada via innerHTML)
  const mo=new MutationObserver(()=>{ const cap=scr.querySelector('#cap_nome'); if(cap && !cap.dataset.wired){ cap.dataset.wired=1; wireCapture(scr.querySelector('.screen')); }});
  mo.observe(scr,{childList:true,subtree:true});

  return { next, commit, submitCapture, jump, fillAndResult, show };
})();

Quiz.show(0);
</script>
</body>
</html>
