<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Diagnóstico Gatilho Vagal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EEF3F5; --surface:#FFFFFF; --ink:#0C2733; --ink-soft:#54707C; --ink-faint:#8AA1AB;
    --line:#DBE6EA; --teal:#0FA69F; --teal-deep:#0A7C77; --teal-wash:#E6F5F3;
    --alert:#E85D38; --alert-strong:#D22E24; --alert-wash:#FCEAE4; --amber:#F0A93B;
    --shadow:0 10px 40px -12px rgba(12,39,51,.28); --shadow-sm:0 4px 14px -6px rgba(12,39,51,.22);
    --radius:18px; --radius-sm:13px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:17px;line-height:1.5;
    -webkit-font-smoothing:antialiased;display:flex;justify-content:center;
    background-image:radial-gradient(circle at 50% -10%, #F6FAFB 0%, var(--bg) 55%);}
  .app{width:100%;max-width:540px;min-height:100dvh;background:var(--surface);display:flex;flex-direction:column;
    position:relative;overflow:hidden;box-shadow:var(--shadow);}
  @media(min-width:560px){.app{margin:22px 0;min-height:calc(100dvh - 44px);border-radius:26px}}

  /* MONITOR */
  .monitor{padding:14px 20px 12px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#0C2733 0%,#123543 100%);color:#fff;position:relative;z-index:5;flex-shrink:0;}
  .monitor.hidden{display:none}
  .monitor-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
  .brand{display:flex;align-items:center;gap:8px;font-family:'Space Grotesk';font-weight:600;font-size:14.5px;letter-spacing:.2px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--teal);animation:beat 1.6s infinite}
  @keyframes beat{0%{box-shadow:0 0 0 0 rgba(15,166,159,.6)}70%{box-shadow:0 0 0 7px rgba(15,166,159,0)}100%{box-shadow:0 0 0 0 rgba(15,166,159,0)}}
  .step-tag{font-family:'IBM Plex Mono';font-size:11.5px;color:#8FB6BE;letter-spacing:.5px}
  .ecg{height:30px;width:100%;margin:2px 0 10px;overflow:hidden;position:relative;opacity:.9}
  .ecg svg{width:200%;height:100%;display:block;animation:scan 4s linear infinite}
  @keyframes scan{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .ecg path{fill:none;stroke:var(--teal);stroke-width:2;filter:drop-shadow(0 0 4px rgba(15,166,159,.6))}
  .monitor.alert .ecg path{stroke:var(--alert);filter:drop-shadow(0 0 5px rgba(232,93,56,.7))}
  .monitor.alert .ecg svg{animation-duration:1.5s}
  .monitor.alert .brand .dot{background:var(--alert)}
  .gauge-row{display:flex;align-items:center;gap:11px}
  .gauge-label{font-family:'IBM Plex Mono';font-size:10.5px;letter-spacing:1px;color:#9CC0C7;white-space:nowrap;text-transform:uppercase}
  .gauge{flex:1;height:8px;border-radius:6px;background:rgba(255,255,255,.13);overflow:hidden;position:relative}
  .gauge-fill{height:100%;width:8%;border-radius:6px;background:linear-gradient(90deg,var(--teal) 0%,var(--amber) 62%,var(--alert-strong) 100%);transition:width .7s cubic-bezier(.22,1,.36,1)}
  .gauge-val{font-family:'IBM Plex Mono';font-weight:600;font-size:12.5px;color:#fff;min-width:34px;text-align:right}

  .screens{flex:1;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .screen{display:none;flex-direction:column;flex:1;padding:26px 22px 30px;animation:fade .45s ease}
  .screen.active{display:flex}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  .qmeta{display:flex;align-items:center;gap:9px;margin-bottom:14px}
  .qnum{font-family:'IBM Plex Mono';font-size:12px;font-weight:600;color:var(--teal-deep);background:var(--teal-wash);padding:4px 9px;border-radius:7px;letter-spacing:.5px}
  .qblock{font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-faint);letter-spacing:1px;text-transform:uppercase}
  .qtitle{font-family:'Space Grotesk';font-weight:600;font-size:25px;line-height:1.22;letter-spacing:-.4px;margin-bottom:8px}
  .qtitle .em{color:var(--alert-strong)}
  .qsub{color:var(--ink-soft);font-size:15.5px;margin-bottom:20px;line-height:1.45}
  .options{display:flex;flex-direction:column;gap:11px;margin-top:4px}
  .opt{display:flex;align-items:center;gap:13px;padding:16px;border:2px solid var(--line);border-radius:var(--radius-sm);
    background:var(--surface);cursor:pointer;text-align:left;width:100%;font-family:inherit;font-size:17px;color:var(--ink);
    font-weight:500;line-height:1.32;transition:border-color .18s,background .18s,transform .12s;}
  .opt:hover{border-color:#B9D2D8}
  .opt:active{transform:scale(.99)}
  .opt .oe{font-size:22px;line-height:1;flex-shrink:0;width:26px;text-align:center}
  .opt .ck{margin-left:auto;width:22px;height:22px;border:2px solid var(--line);border-radius:7px;flex-shrink:0;position:relative;transition:.18s}
  .opt.selected{border-color:var(--teal);background:var(--teal-wash)}
  .opt.selected .ck{background:var(--teal);border-color:var(--teal)}
  .opt.selected .ck::after{content:"";position:absolute;left:6px;top:2px;width:6px;height:11px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg)}
  .opt.alertopt.selected{border-color:var(--alert);background:var(--alert-wash)}
  .opt.alertopt.selected .ck{background:var(--alert);border-color:var(--alert)}
  .hint{font-size:13px;color:var(--ink-faint);margin-top:14px;font-family:'IBM Plex Mono';letter-spacing:.3px}

  .field{margin-top:6px}
  .field label{display:block;font-weight:600;font-size:15px;margin-bottom:8px;color:var(--ink)}
  .field input{width:100%;padding:15px 16px;border:2px solid var(--line);border-radius:var(--radius-sm);font-family:inherit;font-size:17px;color:var(--ink);background:var(--surface);transition:border-color .18s;}
  .field input:focus{outline:none;border-color:var(--teal)}
  .field + .field{margin-top:16px}
  .slider-wrap{margin-top:10px}
  .slider-val{font-family:'IBM Plex Mono';font-weight:600;font-size:34px;color:var(--teal-deep);text-align:center;margin-bottom:6px}
  .slider-val .u{font-size:16px;color:var(--ink-faint);margin-left:4px}
  input[type=range]{-webkit-appearance:none;width:100%;height:8px;border-radius:6px;background:var(--line);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:30px;height:30px;border-radius:50%;background:var(--teal);border:4px solid #fff;box-shadow:var(--shadow-sm);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:30px;height:30px;border-radius:50%;background:var(--teal);border:4px solid #fff;cursor:pointer}
  .range-ends{display:flex;justify-content:space-between;font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-faint);margin-top:6px}
  .sexrow{display:flex;gap:11px;margin-top:4px}
  .sexrow .opt{justify-content:center;flex-direction:column;gap:7px;padding:20px 10px;text-align:center}
  .sexrow .opt .oe{font-size:30px;width:auto}
  .sexrow .opt .ck{display:none}

  .cta{margin-top:auto;padding-top:22px}
  .btn{width:100%;padding:18px;border:none;border-radius:14px;cursor:pointer;font-family:'Space Grotesk';font-weight:600;
    font-size:18px;letter-spacing:.2px;background:var(--teal);color:#fff;transition:transform .12s,box-shadow .2s,background .2s;
    box-shadow:0 10px 24px -10px rgba(15,166,159,.75);display:flex;align-items:center;justify-content:center;gap:9px;}
  .btn:hover{background:var(--teal-deep)}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{background:#C4D4D9;box-shadow:none;cursor:not-allowed;color:#fff}
  .btn.alert{background:var(--alert);box-shadow:0 10px 26px -10px rgba(232,93,56,.8)}
  .btn.alert:hover{background:var(--alert-strong)}
  .btn.big{padding:20px;font-size:19px}
  .btn-arrow{font-size:20px}
  .btn.pulse{animation:btnpulse 2s infinite}
  @keyframes btnpulse{0%{box-shadow:0 10px 26px -10px rgba(232,93,56,.8),0 0 0 0 rgba(232,93,56,.5)}70%{box-shadow:0 10px 26px -10px rgba(232,93,56,.8),0 0 0 14px rgba(232,93,56,0)}100%{box-shadow:0 10px 26px -10px rgba(232,93,56,.8),0 0 0 0 rgba(232,93,56,0)}}

  /* INTRO */
  .intro{justify-content:center;text-align:center;padding:38px 24px}
  .intro .badge{display:inline-flex;align-items:center;gap:7px;font-family:'IBM Plex Mono';font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--teal-deep);background:var(--teal-wash);padding:7px 13px;border-radius:20px;margin:0 auto 22px}
  .intro h1{font-family:'Space Grotesk';font-weight:700;font-size:33px;line-height:1.14;letter-spacing:-.8px;margin-bottom:16px}
  .intro h1 .em{color:var(--alert-strong)}
  .intro p{color:var(--ink-soft);font-size:16.5px;max-width:400px;margin:0 auto 8px}
  .intro .heartwrap{margin:6px auto 26px}
  .trust{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px;font-size:13px;color:var(--ink-faint);font-family:'IBM Plex Mono'}
  .trust .dot{width:6px;height:6px;border-radius:50%;background:var(--teal)}

  /* BREAK */
  .brk{padding:28px 24px 30px}
  .brk-illus{margin:0 auto 6px;min-height:120px;display:flex;align-items:center;justify-content:center}
  .brk-stage{display:flex;flex-direction:column;gap:0}
  .kicker{font-family:'IBM Plex Mono';font-size:12px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;display:inline-flex;align-items:center;gap:8px}
  .brk.calm .kicker{color:var(--teal-deep)}
  .brk.warn .kicker{color:var(--alert-strong)}
  .brk h2{font-family:'Space Grotesk';font-weight:700;font-size:29px;line-height:1.16;letter-spacing:-.6px;margin-bottom:16px}
  .brk h2 .em{color:var(--alert-strong)}
  .brk p{color:var(--ink-soft);font-size:16.5px;line-height:1.55;margin-bottom:15px}
  .brk p .hl{color:var(--ink);font-weight:600}
  .brk p .hla{color:var(--alert-strong);font-weight:600}
  .statcard{background:var(--ink);color:#fff;border-radius:var(--radius);padding:20px;margin:6px 0 18px;position:relative;overflow:hidden}
  .statcard .big{font-family:'IBM Plex Mono';font-weight:600;font-size:40px;line-height:1;color:var(--amber)}
  .statcard .lbl{font-size:14px;color:#B7CDD4;margin-top:8px;line-height:1.4}
  .counter{display:inline-flex;align-items:center;gap:9px;font-family:'IBM Plex Mono';font-size:13px;color:var(--teal-deep);background:var(--teal-wash);padding:9px 14px;border-radius:22px;margin-bottom:6px}
  .counter .lv{width:8px;height:8px;border-radius:50%;background:var(--teal);animation:beat 1.6s infinite}
  .possbar{background:var(--teal-wash);border-radius:var(--radius);padding:20px;margin:8px 0 18px}
  .possbar .track{height:10px;background:#fff;border-radius:6px;overflow:hidden;margin-bottom:10px}
  .possbar .fill{height:100%;width:0;background:linear-gradient(90deg,var(--alert-strong),var(--amber) 55%,var(--teal));border-radius:6px;transition:width 1.4s cubic-bezier(.22,1,.36,1)}
  .possbar .cap{display:flex;justify-content:space-between;font-family:'IBM Plex Mono';font-size:11.5px;color:var(--ink-soft)}
  .testi{border:1px solid var(--line);border-radius:var(--radius-sm);padding:15px 16px;margin-bottom:11px;background:#FBFDFD}
  .testi .txt{font-size:15px;color:var(--ink);line-height:1.5;font-style:italic}
  .testi .who{font-family:'IBM Plex Mono';font-size:11.5px;color:var(--ink-faint);margin-top:9px;display:flex;align-items:center;gap:7px}
  .testi .who .av{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--teal-deep));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:10px}

  /* progressive reveal + loading */
  .loadrow{margin:4px 0 4px}
  .loadlbl{font-family:'IBM Plex Mono';font-size:12.5px;color:var(--ink-faint);margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .loadlbl .sp{width:13px;height:13px;border:2px solid var(--teal-wash);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loadtrack{height:6px;background:#EAF1F3;border-radius:5px;overflow:hidden}
  .loadfill{height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--teal-deep));border-radius:5px}
  .reveal{opacity:0;transform:translateY(9px);transition:opacity .5s ease,transform .5s ease}
  .reveal.in{opacity:1;transform:none}
  .brk-cta{margin-top:14px;opacity:0;transform:translateY(9px);transition:.5s}
  .brk-cta.in{opacity:1;transform:none}

  /* illustrations */
  .il-bar{animation:grow 1.1s ease forwards;transform-origin:bottom}
  @keyframes grow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
  .il-pulse{animation:ilp 1.8s ease-in-out infinite}
  @keyframes ilp{0%,100%{opacity:.35}50%{opacity:1}}
  .il-ring{transform-origin:center;animation:ring 3s ease-in-out infinite}
  @keyframes ring{0%,100%{transform:scale(.85);opacity:.7}50%{transform:scale(1);opacity:.25}}
  .il-shake{animation:shake 3s ease-in-out infinite}
  @keyframes shake{0%,92%,100%{transform:rotate(0)}94%{transform:rotate(-9deg)}96%{transform:rotate(9deg)}98%{transform:rotate(-6deg)}}
  .il-dash{stroke-dasharray:4 5;animation:dash 14s linear infinite}
  @keyframes dash{to{stroke-dashoffset:-200}}

  /* VSL */
  .vsl{justify-content:center;text-align:center;padding:30px 22px}
  .vsl .kicker2{font-family:'IBM Plex Mono';font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--teal-deep);margin-bottom:14px}
  .vsl h2{font-family:'Space Grotesk';font-weight:600;font-size:23px;line-height:1.25;margin-bottom:18px;letter-spacing:-.3px}
  .videobox{position:relative;width:100%;aspect-ratio:16/9;background:linear-gradient(160deg,#0C2733,#164253);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#fff;border:1px solid rgba(255,255,255,.08);overflow:hidden;margin-bottom:8px}
  .videobox::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 40%,rgba(15,166,159,.22),transparent 60%)}
  .videobox .play{width:66px;height:66px;border-radius:50%;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.35);z-index:2;animation:beat 2s infinite}
  .videobox .play::after{content:"";border-left:20px solid #fff;border-top:12px solid transparent;border-bottom:12px solid transparent;margin-left:5px}
  .videobox .vlbl{font-family:'IBM Plex Mono';font-size:12px;letter-spacing:1px;color:#9CC0C7;z-index:2}
  .videobox .vtag{position:absolute;top:12px;left:12px;font-family:'IBM Plex Mono';font-size:10px;letter-spacing:1px;background:rgba(232,93,56,.9);color:#fff;padding:4px 9px;border-radius:6px;z-index:2}
  .placeholder-note{font-family:'IBM Plex Mono';font-size:10.5px;color:var(--ink-faint);text-align:center;margin-top:2px}

  /* CALC */
  .calc{justify-content:center;text-align:center;padding:40px 26px}
  .calc h2{font-family:'Space Grotesk';font-weight:600;font-size:24px;margin-bottom:8px}
  .calc .sub{color:var(--ink-soft);font-size:15px;margin-bottom:30px}
  .ring{width:130px;height:130px;margin:0 auto 30px;position:relative}
  .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono';font-weight:600;font-size:30px;color:var(--teal-deep)}
  .calc-steps{text-align:left;max-width:350px;margin:0 auto;display:flex;flex-direction:column;gap:13px}
  .cstep{display:flex;align-items:center;gap:12px;font-size:15px;color:var(--ink-faint);opacity:.4;transition:.4s}
  .cstep.done{opacity:1;color:var(--ink)}
  .cstep .ci{width:24px;height:24px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.4s}
  .cstep.done .ci{background:var(--teal);border-color:var(--teal)}
  .cstep.done .ci::after{content:"";width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}

  /* RESULT */
  .result{padding:0}
  .result-hero{background:linear-gradient(165deg,#0C2733 0%,#15414F 100%);color:#fff;padding:34px 24px 30px;text-align:center;position:relative;overflow:hidden}
  .result-hero::before{content:"";position:absolute;top:-40%;left:-20%;width:140%;height:140%;background:radial-gradient(circle,rgba(232,93,56,.20),transparent 55%)}
  .result-hero .rk{font-family:'IBM Plex Mono';font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#9CC0C7;margin-bottom:18px;position:relative}
  .dial{width:190px;height:110px;margin:0 auto 14px;position:relative}
  .dial .needle{position:absolute;bottom:8px;left:50%;width:3px;height:78px;background:var(--alert);transform-origin:bottom center;transform:translateX(-50%) rotate(-52deg);border-radius:3px;box-shadow:0 0 10px rgba(232,93,56,.8);transition:transform 1.6s cubic-bezier(.34,1.35,.5,1)}
  .dial .hub{position:absolute;bottom:2px;left:50%;width:16px;height:16px;background:#fff;border-radius:50%;transform:translateX(-50%)}
  .level-badge{display:inline-flex;align-items:center;gap:8px;font-family:'Space Grotesk';font-weight:700;font-size:15px;letter-spacing:.5px;background:var(--alert);color:#fff;padding:8px 16px;border-radius:22px;position:relative;text-transform:uppercase;animation:beat 1.8s infinite}
  .result-hero .idx{font-family:'IBM Plex Mono';font-weight:600;font-size:15px;color:#fff;margin-top:14px;position:relative}
  .result-hero .idx b{color:var(--amber);font-size:19px}
  .result-body{padding:28px 24px 20px}
  .result-body .greet{font-family:'Space Grotesk';font-weight:600;font-size:22px;line-height:1.25;margin-bottom:16px;letter-spacing:-.3px}
  .result-body p{color:var(--ink-soft);font-size:16px;line-height:1.58;margin-bottom:15px}
  .result-body p .hl{color:var(--ink);font-weight:600}
  .result-body p .hla{color:var(--alert-strong);font-weight:600}
  .databox{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin:6px 0 20px}
  .databox .drow{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;font-size:14.5px;border-bottom:1px solid var(--line)}
  .databox .drow:last-child{border-bottom:none}
  .databox .drow .k{color:var(--ink-soft);display:flex;align-items:center;gap:8px}
  .databox .drow .v{font-family:'IBM Plex Mono';font-weight:600;color:var(--ink)}
  .databox .drow .v.hi{color:var(--alert-strong)}
  .sectlabel{font-family:'IBM Plex Mono';font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:var(--alert-strong);margin:26px 0 12px;display:flex;align-items:center;gap:8px}
  .sectlabel::before{content:"";width:22px;height:2px;background:var(--alert)}
  .futurebox{background:linear-gradient(165deg,#2A1512,#3A1A15);color:#fff;border-radius:var(--radius);padding:22px;margin:4px 0 20px;position:relative;overflow:hidden}
  .futurebox h3{font-family:'Space Grotesk';font-weight:600;font-size:19px;margin-bottom:14px;color:#fff}
  .futurebox p{color:#E9C9C0;font-size:15.5px;line-height:1.55;margin-bottom:12px}
  .futurebox p .w{color:#fff;font-weight:600}
  .futurebox .decline{margin:6px 0 4px}
  .verdict{background:var(--alert-wash);border-left:4px solid var(--alert);border-radius:10px;padding:16px 18px;margin:4px 0 22px}
  .verdict p{color:var(--ink);font-size:16px;line-height:1.55;margin:0;font-weight:500}
  .savior{text-align:center;margin:26px 0 8px}
  .savior .lead{font-family:'Space Grotesk';font-weight:700;font-size:23px;line-height:1.25;letter-spacing:-.4px;margin-bottom:8px}
  .savior .lead .em{color:var(--teal-deep)}
  .savior .sub{color:var(--ink-soft);font-size:15.5px;margin-bottom:18px}
  .urgency{display:flex;align-items:center;justify-content:center;gap:12px;background:var(--ink);color:#fff;border-radius:12px;padding:13px 16px;margin:18px 0 6px}
  .urgency .clockic{font-size:20px}
  .urgency .utxt{font-size:13px;color:#B7CDD4;line-height:1.35;text-align:left}
  .urgency .utime{font-family:'IBM Plex Mono';font-weight:600;font-size:22px;color:var(--amber);margin-left:auto}
  .final-cta{padding:6px 24px 30px}
  .cta-sub{text-align:center;font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-faint);margin-top:14px}

const Quiz = (function(){
  let idx = 0;
  const scr = document.getElementById('screens');
  const monitor = document.getElementById('monitor');
  const gaugeFill = document.getElementById('gaugeFill');
  const gaugeVal = document.getElementById('gaugeVal');
  const stepTag = document.getElementById('stepTag');
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

  function setGauge(pct){ STATE.score=pct; gaugeFill.style.width=pct+'%'; gaugeVal.textContent=String(Math.round(pct)).padStart(2,'0')+'%'; monitor.classList.toggle('alert',pct>=55); }
  function bumpScore(d){ setGauge(Math.min(97, STATE.score+d)); }

  function show(i){
    idx=i; const item=FLOW[i]; scr.innerHTML=''; scr.scrollTop=0;
    monitor.classList.toggle('hidden', ['intro','result'].includes(item.type));
    if(item.type==='q') stepTag.textContent='ANÁLISE '+String(item.num).padStart(2,'0')+'/30';
    const el=document.createElement('div'); el.className='screen active';
    switch(item.type){
      case 'intro': el.className='screen active intro'; el.innerHTML=introHTML(); break;
      case 'q': el.innerHTML=questionHTML(item); break;
      case 'break': el.className='screen active brk '+(item.variant==='warn'?'warn':'calm'); el.innerHTML=breakShell(item); break;
      case 'vsl': el.className='screen active vsl'; el.innerHTML=vslHTML(item); break;
      case 'capture': el.innerHTML=captureHTML(); break;
      case 'calc': el.className='screen active calc'; el.innerHTML=calcHTML(); break;
      case 'result': el.className='screen active result'; el.innerHTML=resultHTML(); break;
    }
    scr.appendChild(el);
    if(item.type==='q') wireQuestion(item, el);
    if(item.type==='break') playBreak(item, el);
    if(item.type==='capture') wireCapture(el);
    if(item.type==='calc') runCalc(el);
    if(item.type==='result') animateResult(el);
  }
  function next(){ if(idx<FLOW.length-1) show(idx+1); }

    <div class="badge">🫀 Diagnóstico em 2 minutos</div>
    <div class="heartwrap">${il_heart()}</div>
    <h1>Você corta o sal, toma o remédio certinho — e a pressão <span class="em">continua subindo?</span></h1>
    <p>Existe um motivo. E ele nunca esteve no seu prato.</p>
    <p>Responda 30 perguntas rápidas e descubra o seu <b>Índice de Alarme Vascular</b> — o cálculo que explica por que nada que você tentou funcionou até hoje.</p>
    <div class="cta"><button class="btn" onclick="Quiz.next()">Iniciar meu diagnóstico <span class="btn-arrow">→</span></button></div>
    <div class="trust"><span class="dot"></span> Gratuito &nbsp;·&nbsp; Resultado personalizado &nbsp;·&nbsp; 2 min</div>`;}

  /* QUESTION */
  function questionHTML(item){
    let inner='';
    if(item.kind==='single'||item.kind==='multi'){
      inner=`<div class="options">`+item.opts.map((o,k)=>`<button class="opt ${item.kind==='multi'?'multi':''} ${o.alert?'alertopt':''}" data-k="${k}" data-s="${o.s||0}">${o.e?`<span class="oe">${o.e}</span>`:''}<span class="otxt">${o.t}</span><span class="ck"></span></button>`).join('')+`</div>`;
      if(item.kind==='multi') inner+=`<div class="hint">▹ selecione todas que se aplicam, depois toque em continuar</div>`;
    }
    if(item.kind==='sex') inner=`<div class="sexrow">`+item.opts.map((o,k)=>`<button class="opt" data-k="${k}" data-v="${o.t}"><span class="oe">${o.e}</span><span class="otxt">${o.t}</span><span class="ck"></span></button>`).join('')+`</div>`;
    if(item.kind==='slider') inner=`<div class="slider-wrap"><div class="slider-val"><span id="sv_${item.id}">${item.def}</span><span class="u">${item.unit}</span></div><input type="range" id="rg_${item.id}" min="${item.min}" max="${item.max}" value="${item.def}"><div class="range-ends"><span>${item.min}</span><span>${item.max}</span></div></div>`;
    const showBtn=(item.kind==='multi'||item.kind==='slider');
    return `<div class="qmeta"><span class="qnum">${String(item.num).padStart(2,'0')}</span><span class="qblock">${item.block}</span></div>
      <div class="qtitle">${item.emoji?item.emoji+' ':''}${item.title}</div>${item.sub?`<div class="qsub">${item.sub}</div>`:''}${inner}
      ${showBtn?`<div class="cta"><button class="btn" id="qcont" ${item.kind==='multi'?'disabled':''} onclick="Quiz.commit()">Continuar <span class="btn-arrow">→</span></button></div>`:''}`;
  }
  function wireQuestion(item, el){
    if(item.kind==='single'){el.querySelectorAll('.opt').forEach(b=>{b.onclick=()=>{el.querySelectorAll('.opt').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');STATE.answers[item.id]={k:+b.dataset.k,t:item.opts[+b.dataset.k].t,meta:item.opts[+b.dataset.k].meta};bumpScore(+b.dataset.s*.8);setTimeout(next,260);};});}
    if(item.kind==='sex'){el.querySelectorAll('.opt').forEach(b=>{b.onclick=()=>{el.querySelectorAll('.opt').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');STATE.answers[item.id]=b.dataset.v;setTimeout(next,260);};});}
    if(item.kind==='multi'){const btn=el.querySelector('#qcont');el.querySelectorAll('.opt').forEach(b=>{b.onclick=()=>{b.classList.toggle('selected');btn.disabled=el.querySelectorAll('.opt.selected').length===0;};});}
    if(item.kind==='slider'){const rg=el.querySelector('#rg_'+item.id),sv=el.querySelector('#sv_'+item.id);rg.oninput=()=>{sv.textContent=rg.value;STATE.answers[item.id]=+rg.value;};STATE.answers[item.id]=+rg.value;}
  }
  function commit(){
    const item=FLOW[idx];
    if(item.kind==='multi'){const el=scr.querySelector('.screen');const sel=[...el.querySelectorAll('.opt.selected')];STATE.answers[item.id]=sel.map(s=>item.opts[+s.dataset.k].t);bumpScore(sel.reduce((a,s)=>a+(+s.dataset.s||0),0)*.6);}
    next();
  }

  /* BREAK — progressive reveal player */
  function breakShell(item){
    return `<div class="brk-illus">${illustration(item.illus)}</div>
      <div class="brk-stage" id="brkStage"></div>
      <div class="brk-cta" id="brkCta"><button class="btn ${item.ctaAlert?'alert':''}" onclick="Quiz.next()">${item.cta} <span class="btn-arrow">→</span></button></div>`;
  }
  function playBreak(item, el){
    const stage=el.querySelector('#brkStage');
    const ctaWrap=el.querySelector('#brkCta');
    const fromG=STATE.score, toG=item.gaugeTo||STATE.score;
    let step=0;
    function ramp(k){ setGauge(fromG+(toG-fromG)*k); }
    function nextStep(){
      if(step>=item.steps.length){ ctaWrap.classList.add('in'); ramp(1); return; }
      const s=item.steps[step];
      const load=document.createElement('div'); load.className='loadrow';
      load.innerHTML=`<div class="loadlbl"><span class="sp"></span>${s.load}...</div><div class="loadtrack"><div class="loadfill"></div></div>`;
      stage.appendChild(load);
      const fill=load.querySelector('.loadfill');
      const dur=reduced?60:(s.dur||1100);
      requestAnimationFrame(()=>{ fill.style.transition=`width ${dur}ms cubic-bezier(.3,.7,.4,1)`; fill.style.width='100%'; });
      // ramp gauge across steps
      ramp((step+1)/item.steps.length*0.9);
      setTimeout(()=>{
        load.remove();
        const rev=document.createElement('div'); rev.className='reveal'; rev.innerHTML=s.reveal;
        stage.appendChild(rev);
        // bridge dynamic headline
        const bh=rev.querySelector('#bridgeH');
        if(bh){const a=STATE.answers;const tempo=(a.tempo_med&&a.tempo_med.meta)?a.tempo_med.meta:'algum tempo';bh.innerHTML=`Com <span class="em">${a.idade||'—'} anos</span> e ${tempo} de tratamento sem controle total, já temos tudo que precisamos.`;}
        requestAnimationFrame(()=>rev.classList.add('in'));
        const pf=rev.querySelector('#possfill'); if(pf) setTimeout(()=>pf.style.width='88%',250);
        rev.scrollIntoView({behavior:reduced?'auto':'smooth',block:'nearest'});
        step++;
        setTimeout(nextStep, reduced?60:520);
      }, dur+(reduced?0:160));
    }
    nextStep();
  }

  /* VSL */
  function vslHTML(item){return `<div class="kicker2">${item.kicker}</div><h2>${item.h}</h2>
    <div class="videobox"><span class="vtag">${item.tag}</span><div class="play"></div><span class="vlbl">${item.vlbl}</span></div>
    <div class="placeholder-note">▹ espaço reservado — o vídeo do expert entra aqui</div>
    <div class="cta"><button class="btn" onclick="Quiz.next()">${item.btn} <span class="btn-arrow">→</span></button></div>`;}

  /* CAPTURE */
  function captureHTML(){return `<div class="qmeta"><span class="qnum">✓</span><span class="qblock">Diagnóstico pronto</span></div>
    <div class="qtitle">Pra onde enviamos o seu resultado?</div>
    <div class="qsub">Seu Índice de Alarme Vascular e o acesso ao protocolo ficam vinculados a este e-mail.</div>
    <div class="field"><label>Seu nome</label><input type="text" id="cap_nome" placeholder="Como podemos te chamar?" autocomplete="given-name"></div>
    <div class="field"><label>Seu melhor e-mail</label><input type="email" id="cap_email" placeholder="seu@email.com" autocomplete="email"></div>
    <div class="cta"><button class="btn" id="capbtn" disabled onclick="Quiz.submitCapture()">Ver meu diagnóstico <span class="btn-arrow">→</span></button></div>
    <div class="hint" style="text-align:center">🔒 Seus dados ficam protegidos e não são compartilhados.</div>`;}
  function wireCapture(el){const n=el.querySelector('#cap_nome'),e=el.querySelector('#cap_email'),b=el.querySelector('#capbtn');function chk(){b.disabled=!(n.value.trim().length>1&&/.+@.+\..+/.test(e.value));}n.oninput=chk;e.oninput=chk;}
  function submitCapture(){const el=scr.querySelector('.screen');STATE.answers.nome=el.querySelector('#cap_nome').value.trim();STATE.answers.email=el.querySelector('#cap_email').value.trim();setGauge(97);next();}

  /* CALC */
  function calcHTML(){return `<div class="ring"><svg width="130" height="130"><circle cx="65" cy="65" r="56" stroke="#E1ECEF" stroke-width="10" fill="none"/><circle id="ringP" cx="65" cy="65" r="56" stroke="var(--teal)" stroke-width="10" fill="none" stroke-linecap="round" stroke-dasharray="352" stroke-dashoffset="352"/></svg><div class="pct" id="ringPct">0%</div></div>
    <h2>Cruzando as suas respostas...</h2><div class="sub">Montando seu diagnóstico personalizado</div>
    <div class="calc-steps">
      <div class="cstep"><span class="ci"></span> Cruzando respostas com o perfil de alerta autonômico</div>
      <div class="cstep"><span class="ci"></span> Analisando seu padrão respiratório</div>
      <div class="cstep"><span class="ci"></span> Medindo tempo de exposição ao estado de alerta</div>
      <div class="cstep"><span class="ci"></span> Calculando seu Índice de Alarme Vascular</div>
    </div>`;}
  function runCalc(el){const steps=[...el.querySelectorAll('.cstep')];const ring=el.querySelector('#ringP'),pct=el.querySelector('#ringPct');const dur=reduced?200:3600,t0=performance.now();
    function tick(now){let k=Math.min(1,(now-t0)/dur);ring.style.strokeDashoffset=352-(352*k);pct.textContent=Math.round(k*100)+'%';steps.forEach((s,i)=>{if(k>(i+1)/4.3)s.classList.add('done');});if(k<1)requestAnimationFrame(tick);else setTimeout(next,500);}
    requestAnimationFrame(tick);}

  /* RESULT */
  function computeIndex(){let b=78+Math.round(Math.min(11,(STATE.score-60)*0.35));return Math.max(78,Math.min(89,b));}
  function resultHTML(){
    const a=STATE.answers;
    const nome=a.nome?a.nome.split(' ')[0]:'';
    const idade=a.idade||54, altura=a.altura||165, peso=a.peso||78;
    const imc=peso/Math.pow(altura/100,2), imcTxt=imc.toFixed(1).replace('.',',');
    const imcBand=imc>=30?'bem acima da faixa saudável':imc>=25?'acima da faixa saudável':'dentro da faixa';
    const idx=computeIndex();
    const tempo=(a.tempo_med&&a.tempo_med.meta)?a.tempo_med.meta:'algum tempo';
    const medo=Array.isArray(a.q18)&&a.q18.length?a.q18[0].toLowerCase():'o que pode acontecer';
    const anosExpo=Math.max(1,Math.round(idade-35));
    const imcLine=imc>=25
      ? `Com <span class="hl">${peso}kg</span> e <span class="hl">${altura}cm</span>, seu índice corporal está <span class="hla">${imcBand}</span> — e cada ponto acima adiciona carga ao mesmo sistema de alerta que já está sobrecarregado.`
      : `Mesmo com um índice corporal dentro da faixa, seu sistema de alerta está sobrecarregado — o que confirma que, no seu caso, a causa é ainda mais ligada ao gatilho autonômico do que ao peso.`;
    return `
    <div class="result-hero">
      <div class="rk">Diagnóstico concluído · Índice de Alarme Vascular</div>
      <div class="dial">${il_dial()}<div class="needle" id="needle"></div><div class="hub"></div></div>
      <div class="level-badge">⚠ ALTO · Nível 4 de 5</div>
      <div class="idx">Seu índice: <b>${idx}</b> / 100</div>
    </div>
    <div class="result-body">
      <div class="greet">${nome?nome+', ':''}seu resultado explica exatamente o que você vem vivendo.</div>
      <div class="databox">
        <div class="drow"><span class="k">🎂 Idade</span><span class="v">${idade} anos</span></div>
        <div class="drow"><span class="k">⚖️ Índice corporal (IMC)</span><span class="v ${imc>=25?'hi':''}">${imcTxt}</span></div>
        <div class="drow"><span class="k">💊 Tempo de tratamento</span><span class="v">${tempo}</span></div>
        <div class="drow"><span class="k">⏱️ Tempo em estado de alerta</span><span class="v hi">≈ ${anosExpo} anos</span></div>
        <div class="drow"><span class="k">🚨 Nível de alarme</span><span class="v hi">ALTO (4/5)</span></div>
      </div>
      <p>Pelas suas respostas, o seu corpo aperta os seus vasos há <span class="hla">cerca de ${anosExpo} anos</span> — como quem aperta uma mangueira e não solta. Respiração curta, sono picado, ombros tensos, pressão que sobe do nada — não são coisas separadas. <span class="hl">São o mesmo aperto, ligado 24 horas por dia.</span></p>
      <p>${imcLine}</p>
      <p>É por isso que cortar o sal não resolveu. É por isso que o remédio segura o número, mas você continua com medo de ${medo}.</p>

      <div class="sectlabel">O que acontece se nada mudar</div>
      <div class="futurebox">${il_decline()}
        <h3>Esse aperto não descansa — e não avisa.</h3>
        <p>Enquanto o seu corpo aperta a mangueira, seus vasos seguem espremidos, dia e noite. O desgaste <span class="w">não pausa</span> — ele se acumula em silêncio.</p>
        <p>E aqui está a parte que mais assusta: <span class="w">a pressão alta não dói.</span> Muita gente só descobre que passou dos limites no dia em que o corpo dá o primeiro sinal grave. Por isso ela é chamada de "a inimiga silenciosa".</p>
        <p>Cada dia com esse aperto ligado é um dia que <span class="w">não volta.</span></p>
      </div>

      <div class="verdict"><p>Você nunca teve um problema de disciplina. O seu corpo apertava os seus vasos <span class="hla">como uma mangueira</span> — e ninguém tinha te dito. Agora você sabe o que fazer pra afrouxar.</p></div>

      <div class="savior">
        <div class="lead">Existe <span class="em">uma única coisa</span> entre você e afrouxar esse aperto.</div>
        <div class="sub">Assista ao vídeo abaixo. Ele mostra exatamente como acionar o seu Gatilho Vagal — o passo que muda tudo a partir de hoje. 👇</div>
      </div>
    </div>

    <div style="padding:0 24px">
      <div class="videobox"><span class="vtag">VSL 2 · A VIRADA</span><div class="play"></div><span class="vlbl">[ VÍDEO DO EXPERT · 1–3 min ]</span></div>
      <div class="placeholder-note">▹ espaço reservado — vídeo de pitch do expert entra aqui</div>
      <div class="urgency"><span class="clockic">⏳</span><span class="utxt">Seu diagnóstico completo fica reservado por tempo limitado nesta sessão.</span><span class="utime" id="uclock">15:00</span></div>
    </div>

    <div class="final-cta">
      <button class="btn alert big pulse" onclick="alert('→ redireciona para o checkout')">Quero acionar meu Gatilho Vagal agora <span class="btn-arrow">→</span></button>
      <div class="cta-sub">Acesso imediato pela área de membros após a compra</div>
    </div>
    <div class="disclaimer-slot">[ ESPAÇO PARA DISCLAIMERS — inserção manual ]<br>caráter educativo · não substitui acompanhamento médico</div>`;
  }
  function animateResult(el){
    const needle=el.querySelector('#needle');
    if(needle) setTimeout(()=>needle.style.transform='translateX(-50%) rotate(52deg)',300);
    // countdown
    const clock=el.querySelector('#uclock'); let t=15*60;
    if(clock){const iv=setInterval(()=>{t--;if(t<0){clearInterval(iv);return;}const m=String(Math.floor(t/60)).padStart(2,'0'),s=String(t%60).padStart(2,'0');clock.textContent=m+':'+s;},1000);}
  }

  /* ===== ILUSTRAÇÕES SVG ===== */

    if(kind==='bars') return il_bars();
    if(kind==='hose') return il_hose();
    if(kind==='breath') return il_breath();
    if(kind==='climb') return il_climb();
    if(kind==='assemble') return il_assemble();
    return '';
  }

    <rect class="il-bar" x="48" y="48" width="20" height="62" rx="5" fill="#0FA69F" style="animation-delay:.2s"/>
    <rect class="il-bar" x="78" y="30" width="20" height="80" rx="5" fill="#F0A93B" style="animation-delay:.35s"/>
    <rect class="il-bar" x="108" y="18" width="20" height="92" rx="5" fill="#E85D38" style="animation-delay:.5s"/>
    <line x1="10" y1="110" x2="140" y2="110" stroke="#DBE6EA" stroke-width="2"/></g></svg>`;}

    <defs><clipPath id="hc"><path d="M6 54 h58 q10 0 14 6 q7 -3 14 0 q4 -6 14 -6 h44 v22 h-44 q-10 0 -14 -6 q-7 3 -14 0 q-4 6 -14 6 h-58 z"/></clipPath></defs>
    <!-- corpo da mangueira -->
    <path d="M6 54 h58 q10 0 14 6 q7 -3 14 0 q4 -6 14 -6 h44 v22 h-44 q-10 0 -14 -6 q-7 3 -14 0 q-4 6 -14 6 h-58 z" fill="#E6F5F3" stroke="#0FA69F" stroke-width="2.5"/>
    <!-- água correndo antes do aperto -->
    <g clip-path="url(#hc)"><rect x="6" y="58" width="70" height="14" fill="#0FA69F" opacity=".35"/></g>
    <!-- ponto do aperto (garra) -->
    <path d="M80 44 q6 16 0 32" stroke="#E85D38" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M96 44 q-6 16 0 32" stroke="#E85D38" stroke-width="5" fill="none" stroke-linecap="round"/>
    <ellipse cx="88" cy="60" rx="4" ry="9" fill="#E85D38"/>
    <!-- jato de pressão saindo com força após o aperto -->
    <g stroke="#E85D38" stroke-width="3" stroke-linecap="round" class="il-pulse">
      <line x1="120" y1="60" x2="150" y2="48"/>
      <line x1="120" y1="64" x2="152" y2="64"/>
      <line x1="120" y1="68" x2="150" y2="80"/>
    </g>
    <circle class="il-pulse" cx="156" cy="46" r="2.5" fill="#E85D38" style="animation-delay:.3s"/>
    <circle class="il-pulse" cx="159" cy="64" r="2.5" fill="#E85D38" style="animation-delay:.5s"/>
    <circle class="il-pulse" cx="156" cy="82" r="2.5" fill="#E85D38" style="animation-delay:.7s"/>
    <text x="88" y="102" font-family="IBM Plex Mono" font-size="9" fill="#8AA1AB" text-anchor="middle">SEU CORPO APERTANDO</text></svg>`;}
  function il_breath(){return `<svg width="150" height="120" viewBox="0 0 150 120">
    <circle class="il-ring" cx="75" cy="60" r="44" fill="none" stroke="#0FA69F" stroke-width="2" opacity=".3"/>
    <circle class="il-ring" cx="75" cy="60" r="32" fill="none" stroke="#0FA69F" stroke-width="2" opacity=".5" style="animation-delay:.4s"/>
    <path d="M75 44 c-14 -14 -34 4 -34 4 l0 20 c0 12 10 20 20 22 l14 4 14 -4 c10 -2 20 -10 20 -22 l0 -20 s-20 -18 -34 -4 z" fill="#E6F5F3" stroke="#0FA69F" stroke-width="2.5"/>
    <line x1="75" y1="46" x2="75" y2="94" stroke="#0FA69F" stroke-width="2.5"/></svg>`;}
  function il_climb(){return `<svg width="150" height="120" viewBox="0 0 150 120">
    <path class="il-dash" d="M14 104 C50 104 46 60 78 54 C104 49 100 26 134 24" fill="none" stroke="#0FA69F" stroke-width="3" stroke-linecap="round"/>
    <circle cx="14" cy="104" r="6" fill="#8AA1AB"/>
    <g><rect x="130" y="10" width="3" height="20" fill="#0A7C77"/><path d="M133 11 l16 5 -16 6 z" fill="#0FA69F"/></g>
    <circle cx="134" cy="24" r="7" fill="#0FA69F" class="il-pulse"/></svg>`;}
  function il_assemble(){return `<svg width="150" height="120" viewBox="0 0 150 120">
    <rect x="46" y="26" width="58" height="70" rx="8" fill="#F6FAFB" stroke="#0FA69F" stroke-width="2.5"/>
    <line x1="56" y1="44" x2="94" y2="44" stroke="#0FA69F" stroke-width="3" stroke-linecap="round"/>
    <line x1="56" y1="56" x2="88" y2="56" stroke="#B9D2D8" stroke-width="3" stroke-linecap="round"/>
    <line x1="56" y1="68" x2="92" y2="68" stroke="#B9D2D8" stroke-width="3" stroke-linecap="round"/>
    <circle cx="75" cy="82" r="9" fill="#E6F5F3" stroke="#0FA69F" stroke-width="2"/>
    <circle class="il-ring" cx="75" cy="60" r="52" fill="none" stroke="#0FA69F" stroke-width="1.5" opacity=".3" stroke-dasharray="6 6"/></svg>`;}
  function il_dial(){return `<svg width="190" height="110" viewBox="0 0 190 110"><path d="M16 100 A80 80 0 0 1 174 100" fill="none" stroke="#1d4a5a" stroke-width="13" stroke-linecap="round"/><path d="M16 100 A80 80 0 0 1 66 30" fill="none" stroke="#0FA69F" stroke-width="13" stroke-linecap="round"/><path d="M66 30 A80 80 0 0 1 124 30" fill="none" stroke="#F0A93B" stroke-width="13"/><path d="M124 30 A80 80 0 0 1 174 100" fill="none" stroke="#D22E24" stroke-width="13" stroke-linecap="round"/></svg>`;}
  function il_decline(){return `<svg width="100%" height="54" viewBox="0 0 300 54" preserveAspectRatio="none" style="margin-bottom:14px"><path d="M0 12 C60 14 90 30 150 34 C210 38 250 48 300 50" fill="none" stroke="#E85D38" stroke-width="3" stroke-linecap="round" class="il-dash"/><circle cx="300" cy="50" r="5" fill="#E85D38"/></svg>`;}

  return { next, commit, submitCapture, show };
})();

Quiz.show(0);
</script>
